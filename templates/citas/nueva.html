{% extends "base.html" %}

{% block title %}New Appointment | Flask CRUD{% endblock %}

{% block content %}
<div class="form-section">
    <div class="section-header">
        <h1>Nueva Cita</h1>
        <a href="{{ url_for('citas.lista') }}" class="btn btn-secondary">Volver al Listado</a>
    </div>

    <div class="form-card glass">
        <form action="#" method="POST">
            <div class="form-group">
                <label for="paciente">Nombre del Paciente</label>
                <input type="text" id="paciente" name="paciente" class="form-control" placeholder="Nombre completo" required>
            </div>
            
            <div class="form-group">
                <label for="medico">Médico</label>
                <select id="medico" name="medico" class="form-control" required>
                    <option value="" disabled selected>Selecciona un médico</option>
                    <option value="Dr. House">Dr. House</option>
                    <option value="Dra. Quinn">Dra. Quinn</option>
                    <option value="Dr. Strange">Dr. Strange</option>
                </select>
            </div>

            <div class="form-group">
                <label for="fecha">Fecha de la Cita</label>
                <input type="date" id="fecha" name="fecha" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="notas">Notas Internas</label>
                <textarea id="notas" name="notas" class="form-control" rows="3" placeholder="Instrucciones especiales..."></textarea>
            </div>

            <div class="cta-buttons" style="margin-top: 2rem;">
                <button type="submit" class="btn btn-primary">Crear Cita</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
